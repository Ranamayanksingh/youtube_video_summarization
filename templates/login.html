<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — YT Summarizer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="login-wrap">
    <div class="login-box">
      <div class="login-logo">▶</div>
      <div>
        <h1>YT Summarizer</h1>
        <p class="muted" style="margin-top:0.25rem;font-size:0.88rem;">Enter your access token to continue.</p>
      </div>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" style="display:flex;flex-direction:column;gap:1rem;">
        <input type="hidden" name="next" value="{{ next }}" />
        <div>
          <label for="token">Access Token</label>
          <input
            type="password"
            id="token"
            name="token"
            placeholder="your_secret_token"
            autofocus
            required
          />
        </div>
        <button type="submit" style="align-self:stretch;text-align:center;">Sign in →</button>
      </form>
    </div>
  </main>
</body>
</html>
