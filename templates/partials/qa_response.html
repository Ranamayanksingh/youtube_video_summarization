  // Remove empty-state placeholder on first answer
  (function() {
    const empty = document.querySelector(".qa-empty");
    if (empty) empty.remove();
  })();
</script>
<div class="qa-item">
  <p class="qa-question"><strong>Q:</strong> {{ question }}</p>
  <p class="qa-answer">{{ answer }}</p>
</div>
